<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PDF Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    height:100vh;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:300px;
    background:#111827;
    padding:20px;
    border-right:1px solid #1f2937;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:white;
    margin-bottom:20px;
}

.upload-box{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
}

input[type=file]{
    width:100%;
    color:white;
    margin-bottom:10px;
}

.upload-btn{
    width:100%;
    padding:10px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.status{
    margin-top:10px;
    color:#22c55e;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;
    color:white;
    font-size:22px;
    border-bottom:1px solid #1f2937;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:75%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.5;
    white-space:pre-wrap;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:#1f2937;
    color:white;
}

/* INPUT */
.input-area{
    display:flex;
    padding:15px;
    background:#111827;
}

.input-area input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.send-btn{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">📄 AI PDF Chat</div>

    <div class="upload-box">
        <input type="file" id="pdfFile" accept=".pdf">

        <button type="button" class="upload-btn" onclick="uploadPDF()">
            Upload PDF
        </button>

        <div class="status" id="status">
            No PDF Uploaded
        </div>
    </div>
</div>

<div class="main">

    <div class="header">
        Chat with your PDF
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input
            type="text"
            id="question"
            placeholder="Ask anything from PDF..."
        >

        <button type="button" class="send-btn" onclick="sendQuestion()">
            Send
        </button>
    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:5000";

/* ADD MESSAGE SAFE */
function addMessage(text, type){
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;

    const chatBox = document.getElementById("chatBox");
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* SHOW LOADING SAFE */
function showLoading(){
    const chatBox = document.getElementById("chatBox");

    const loading = document.createElement("div");
    loading.classList.add("message", "bot");
    loading.id = "loading";
    loading.innerText = "Thinking...";

    chatBox.appendChild(loading);
}

/* REMOVE LOADING SAFE */
function removeLoading(){
    const loading = document.getElementById("loading");
    if(loading){
        loading.remove();
    }
}

/* UPLOAD PDF */
async function uploadPDF(){

    const file = document.getElementById("pdfFile").files[0];

    if(!file){
        alert("Select a PDF first");
        return;
    }

    const status = document.getElementById("status");
    status.innerText = "⏳ Uploading...";

    let formData = new FormData();
    formData.append("file", file);

    try{

        const res = await fetch(`${API_URL}/upload`, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if(res.ok){
            status.innerText = `✅ PDF Ready (${data.chunks} chunks)`;
        }else{
            status.innerText = data.error || "Upload failed";
        }

    }catch(err){
        status.innerText = "❌ Server not running";
    }
}

/* CHAT */
async function sendQuestion(){

    const input = document.getElementById("question");
    const question = input.value.trim();

    if(question === "") return;

    addMessage(question, "user");
    input.value = "";

    showLoading();

    try{

        const res = await fetch(`${API_URL}/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question })
        });

        const data = await res.json();

        removeLoading();

        if(res.ok){
            addMessage(data.answer, "bot");
        }else{
            addMessage(data.error || "Error", "bot");
        }

    }catch(err){

        removeLoading();
        addMessage("❌ Server not running", "bot");
    }
}

/* ENTER KEY */
document.getElementById("question")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendQuestion();
    }
});

</script>

</body>
</html>
